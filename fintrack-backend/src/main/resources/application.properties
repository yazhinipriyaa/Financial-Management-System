# ===== Server =====
server.port=8080

# ===== MySQL Database =====
# Set these as environment variables or replace for local dev only
spring.datasource.url=jdbc:mysql://localhost:3306/fintrack_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
# Set JWT_SECRET as an environment variable in production
app.jwt.secret=${JWT_SECRET:FinTrack2026SecureSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256Algorithm}
app.jwt.expiration-ms=86400000

# ===== File Upload Size =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
