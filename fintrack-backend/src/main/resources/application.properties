# ===== Server =====
server.port=${PORT:8080}

# ===== MySQL Database =====
# Railway provides MYSQL_URL, MYSQL_USER, MYSQL_PASSWORD automatically
# For local dev, fallback values are used
spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/fintrack_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:${DB_USERNAME:root}}
spring.datasource.password=${MYSQL_PASSWORD:${DB_PASSWORD:root123}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== JWT =====
app.jwt.secret=${JWT_SECRET:FinTrack2026SecureSecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256Algorithm}
app.jwt.expiration-ms=86400000

# ===== CORS =====
# Add your Vercel frontend URL here after deployment
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ===== File Upload Size =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
